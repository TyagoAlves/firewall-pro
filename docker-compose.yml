services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firewall-pro-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - database:/var/www/database
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
    networks:
      - firewall-pro

  nginx:
    image: nginx:alpine
    container_name: firewall-pro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - firewall-pro
    depends_on:
      - app

networks:
  firewall-pro:
    driver: bridge

volumes:
  database:
