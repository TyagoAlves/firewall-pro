<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Alpine Firewall Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: { gray: { 950: '#0a0e1a' } },
        },
      },
    };
  </script>
  <style>
    .gradient-text { background: linear-gradient(135deg, #06b6d4, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#0a0e1a] text-gray-100 font-sans antialiased min-h-screen flex flex-col items-center justify-center px-4">
  <a href="/firewall-pro/" class="flex items-center gap-2 mb-8">
    <span class="w-10 h-10 rounded-xl bg-cyan-500 flex items-center justify-center text-black font-bold text-lg">AF</span>
    <span class="font-bold text-2xl">Alpine<span class="text-cyan-400">Pro</span></span>
  </a>
  <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl p-8">
    <h2 class="text-2xl font-bold text-center mb-8">Entrar</h2>
    <form class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Email</label>
        <input type="email" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-gray-100 focus:outline-none focus:border-cyan-500 transition" placeholder="seu@email.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Senha</label>
        <input type="password" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-gray-100 focus:outline-none focus:border-cyan-500 transition" placeholder="••••••••">
      </div>
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2">
          <input type="checkbox" class="rounded bg-gray-950 border-gray-700 text-cyan-500 focus:ring-cyan-500">
          <span class="text-sm text-gray-400">Lembrar-me</span>
        </label>
        <a href="#" class="text-sm text-cyan-400 hover:text-cyan-300">Esqueceu a senha?</a>
      </div>
      <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-xl transition shadow-lg shadow-cyan-500/25">Entrar</button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">
      Ainda não tem conta? <a href="/firewall-pro/contact" class="text-cyan-400 hover:text-cyan-300">Fale conosco</a>
    </p>
  </div>
</body>
</html>
